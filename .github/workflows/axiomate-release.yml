name: Axiomate Release

# Triggered by pushing the `axiomate` branch. The guard job creates a release
# tag shaped `axiomate-v<crate-version>+<run_number>` for that exact commit,
# then the build matrix uploads the binaries that axiomate consumes at
# bootstrap/package time via rtk-axiomate/scripts/fetch.mjs, which resolves
# GitHub's latest release.
#
# Deliberately minimal compared to upstream release.yml: no DEB/RPM, no
# Discord, no Homebrew tap push, no telemetry secrets. Uses the default
# GITHUB_TOKEN so it works in a freshly-forked repo without extra setup.

on:
  push:
    branches:
      - axiomate
  workflow_dispatch:
    inputs:
      tag:
        description: 'Optional existing tag to release, e.g. axiomate-v0.40.0+1'
        required: false

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  guard:
    name: Resolve axiomate release tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.name }}
      target_sha: ${{ steps.tag.outputs.target_sha }}
    steps:
      - name: Checkout axiomate branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'push' && github.sha || 'axiomate' }}
          fetch-depth: 0

      - name: Resolve release tag
        id: tag
        run: |
          TAG="${{ github.event.inputs.tag }}"
          if [ -n "$TAG" ]; then
            TARGET_SHA="$(git rev-list -n 1 "$TAG")"
          else
            VERSION="$(sed -n 's/^version = "\([^"]*\)"/\1/p' Cargo.toml | head -1)"
            if [ -z "$VERSION" ]; then
              echo "::error::Could not read crate version from Cargo.toml"
              exit 1
            fi
            TAG="axiomate-v${VERSION}+${GITHUB_RUN_NUMBER}"
            TARGET_SHA="$(git rev-parse HEAD)"
          fi

          if [[ ! "$TAG" =~ ^axiomate-v[0-9]+\.[0-9]+\.[0-9]+\+[0-9]+$ ]]; then
            echo "::error::Axiomate release tags must match axiomate-v<major>.<minor>.<patch>+<respin>; got '$TAG'"
            exit 1
          fi

          echo "name=$TAG" >> "$GITHUB_OUTPUT"
          echo "target_sha=$TARGET_SHA" >> "$GITHUB_OUTPUT"

      - name: Verify target is on axiomate branch
        run: |
          TAG="${{ steps.tag.outputs.name }}"
          TARGET_SHA="${{ steps.tag.outputs.target_sha }}"
          git fetch origin +refs/heads/axiomate:refs/remotes/origin/axiomate
          if ! git merge-base --is-ancestor "$TARGET_SHA" origin/axiomate; then
            echo "::error::Tag '$TAG' ($TARGET_SHA) is not contained in origin/axiomate"
            exit 1
          fi

      - name: Create generated tag
        if: steps.tag.outputs.name != github.event.inputs.tag
        run: |
          TAG="${{ steps.tag.outputs.name }}"
          TARGET_SHA="${{ steps.tag.outputs.target_sha }}"
          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            EXISTING_SHA="$(git rev-list -n 1 "$TAG")"
            if [ "$EXISTING_SHA" != "$TARGET_SHA" ]; then
              echo "::error::Tag '$TAG' already points to $EXISTING_SHA, not $TARGET_SHA"
              exit 1
            fi
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$TAG" "$TARGET_SHA"
          git push origin "refs/tags/$TAG"

  build:
    name: Build ${{ matrix.target }}
    needs: [guard]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            archive: tar.gz
            musl: true
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            cross: true
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.guard.outputs.tag }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Install musl tools
        if: matrix.musl
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          cd target/${{ matrix.target }}/release
          tar -czvf ../../../rtk-${{ matrix.target }}.${{ matrix.archive }} rtk
          cd ../../..

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../rtk-${{ matrix.target }}.${{ matrix.archive }} rtk.exe
          cd ../../..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rtk-${{ matrix.target }}
          path: rtk-${{ matrix.target }}.${{ matrix.archive }}

  release:
    name: Create Release
    needs: [guard, build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.guard.outputs.tag }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts + checksums
        run: |
          mkdir -p release
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" \) -exec cp {} release/ \;
          cd release
          sha256sum * > checksums.txt

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.guard.outputs.tag }}
          files: release/*
          prerelease: ${{ contains(needs.guard.outputs.tag, 'rc') || contains(needs.guard.outputs.tag, 'beta') || contains(needs.guard.outputs.tag, 'alpha') }}
          token: ${{ secrets.GITHUB_TOKEN }}
          body: |
            Build of [axiomates/rtk](https://github.com/axiomates/rtk) at tag `${{ needs.guard.outputs.tag }}`.

            These binaries are consumed by [axiomate](https://github.com/axiomates/axiomate) at bootstrap/package time via `rtk-axiomate/scripts/fetch.mjs`. Axiomate resolves GitHub's latest release for `axiomates/rtk`; there is no package-side `rtkVersion` pin.

            Archives:
            * `rtk-x86_64-pc-windows-msvc.zip`
            * `rtk-x86_64-apple-darwin.tar.gz` / `rtk-aarch64-apple-darwin.tar.gz`
            * `rtk-x86_64-unknown-linux-musl.tar.gz` / `rtk-aarch64-unknown-linux-gnu.tar.gz`
            * `checksums.txt`
